name: Update quotes and deploy site

on:
  workflow_dispatch:
  schedule:
    - cron: "7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build universe if missing
        run: |
          if [ ! -f data/universe.csv ]; then
            python build_universe.py
          fi

      - name: Update quotes
        run: python build_quotes.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/latest.csv public/missing_symbols.csv public/candidate_exclusions.csv || true
          git add data/universe.csv data/excluded_symbols.csv || true
          git diff --cached --quiet || git commit -m "Auto update market data"
          git push

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
